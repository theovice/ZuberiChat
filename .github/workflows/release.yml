name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: pnpm tauri build

      - name: List build artifacts
        run: |
          echo "=== NSIS ==="
          Get-ChildItem src-tauri\target\release\bundle\nsis\ -Recurse | Format-Table Name, Length
          echo "=== MSI ==="
          Get-ChildItem src-tauri\target\release\bundle\msi\ -Recurse | Format-Table Name, Length
        shell: pwsh

      - name: Generate latest.json for updater
        shell: pwsh
        run: |
          $version = (Get-Content src-tauri\tauri.conf.json | ConvertFrom-Json).version
          $nsisExe = Get-ChildItem "src-tauri\target\release\bundle\nsis\*-setup.exe" | Select-Object -First 1
          $nsisSig = Get-ChildItem "src-tauri\target\release\bundle\nsis\*-setup.exe.sig" -ErrorAction SilentlyContinue | Select-Object -First 1
          $sig = if ($nsisSig) { (Get-Content $nsisSig.FullName -Raw).Trim() } else { "" }
          $json = @{
            version = $version
            notes = "Zuberi v$version"
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $sig
                url = "https://github.com/theovice/ZuberiChat/releases/download/v$version/$($nsisExe.Name)"
              }
            }
          } | ConvertTo-Json -Depth 5
          $json | Set-Content "latest.json" -Encoding UTF8
          Write-Host "Generated latest.json for v$version"
          Get-Content latest.json

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $version = (Get-Content src-tauri\tauri.conf.json | ConvertFrom-Json).version
          $tag = "v$version"
          $nsisExe = Get-ChildItem "src-tauri\target\release\bundle\nsis\*-setup.exe" | Select-Object -First 1
          $nsisSig = Get-ChildItem "src-tauri\target\release\bundle\nsis\*-setup.exe.sig" -ErrorAction SilentlyContinue | Select-Object -First 1
          $assets = @($nsisExe.FullName, "latest.json")
          if ($nsisSig) { $assets += $nsisSig.FullName }
          $assetArgs = $assets | ForEach-Object { $_ }
          gh release create $tag --title "Zuberi $tag" --notes "Auto-update release for Zuberi $tag" @assetArgs
